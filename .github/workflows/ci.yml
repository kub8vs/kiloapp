name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
